<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>Telegram TWallpaper</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- TWallpaper CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/twallpaper@latest/dist/cdn/style.css"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    #wallpaper {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .content {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.4);
    }
  </style>
</head>

<body>

  <div id="wallpaper"></div>

  <div class="content">
    Telegram Mini App
  </div>

  <!-- TWallpaper -->
  <script src="https://cdn.jsdelivr.net/npm/twallpaper@latest/dist/index.umd.js"></script>

  <script>
    // Telegram Mini App
    const tg = window.Telegram.WebApp;

    tg.ready();
    tg.expand();

    // Theme colors from Telegram
    const bg =
      tg.themeParams.bg_color || "#0f172a";

    // Wallpaper
    const container =
      document.getElementById("wallpaper");

    const wallpaper =
      new window.TWallpaper(container, {
        colors: [
          "#229ED9",
          "#4C8BF5",
          "#7B61FF",
          "#00C2FF"
        ],

        animate: true,
        fps: 60,
        tails: 100,

        pattern: {
          image:
            "https://twallpaper.js.org/patterns/topography.svg",

          opacity: 0.2,
          background: bg,
          blur: 2,
          size: "cover"
        }
      });

    wallpaper.init();
  </script>

</body>
</html>

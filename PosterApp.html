<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Channel Join Check</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0f172a);
      --text: var(--tg-theme-text-color, #e2e8f0);
      --hint: var(--tg-theme-hint-color, #94a3b8);
      --button: var(--tg-theme-button-color, #2563eb);
      --button-text: var(--tg-theme-button-text-color, #ffffff);
      --card: rgba(255, 255, 255, 0.06);
      --ok: #22c55e;
      --warn: #f59e0b;
      --error: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 16px;
    }

    .card {
      width: min(460px, 100%);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    p {
      margin: 0;
      color: var(--hint);
      line-height: 1.5;
    }

    .stack {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .status {
      border-radius: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 14px;
      color: var(--text);
    }

    .status.ok { border-color: rgba(34, 197, 94, 0.45); }
    .status.warn { border-color: rgba(245, 158, 11, 0.45); }
    .status.error { border-color: rgba(239, 68, 68, 0.45); }

    button {
      appearance: none;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      background: var(--button);
      color: var(--button-text);
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }

    button.secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--text);
    }

    .small {
      font-size: 12px;
      color: var(--hint);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Membership verification</h1>
    <p id="subtitle">Checking whether you joined the required channel…</p>

    <section class="stack">
      <div id="status" class="status warn">Initializing Telegram Mini App…</div>
      <button id="joinBtn" class="secondary" hidden>Join channel</button>
      <button id="checkBtn" hidden>I've joined, check again</button>
      <div class="small">If verified, this mini app confirms and closes automatically.</div>
    </section>
  </main>

  <script>
    const CHANNEL_USERNAME = '@your_channel_username'; // e.g. @my_updates_channel
    const CLOSE_DELAY_MS = 1800;

    const tg = window.Telegram?.WebApp;
    const statusEl = document.getElementById('status');
    const subtitleEl = document.getElementById('subtitle');
    const joinBtn = document.getElementById('joinBtn');
    const checkBtn = document.getElementById('checkBtn');

    function setStatus(kind, message) {
      statusEl.className = `status ${kind}`;
      statusEl.textContent = message;
    }

    function showJoinPrompt() {
      setStatus('warn', 'You are not a member yet. Please join the channel first.');
      subtitleEl.textContent = `Required channel: ${CHANNEL_USERNAME}`;
      joinBtn.hidden = false;
      checkBtn.hidden = false;
      joinBtn.onclick = () => {
        tg?.openTelegramLink(`https://t.me/${CHANNEL_USERNAME.replace('@', '')}`);
      };
    }

    function showVerifiedAndClose() {
      setStatus('ok', '✅ Membership confirmed. Closing mini app…');
      subtitleEl.textContent = 'Thanks! You can continue in the bot chat.';
      joinBtn.hidden = true;
      checkBtn.hidden = true;
      tg?.HapticFeedback?.notificationOccurred('success');

      setTimeout(() => {
        tg?.close();
      }, CLOSE_DELAY_MS);
    }

    async function checkMembership() {
      try {
        setStatus('warn', 'Checking channel membership…');

        const initData = tg?.initData;
        const userId = tg?.initDataUnsafe?.user?.id;

        if (!initData || !userId) {
          throw new Error('This mini app must be opened inside Telegram.');
        }

        const response = await fetch('/api/check-membership', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            initData,
            userId,
            channel: CHANNEL_USERNAME
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Unable to verify membership.');
        }

        if (data.joined) {
          showVerifiedAndClose();
        } else {
          showJoinPrompt();
        }
      } catch (error) {
        setStatus('error', `❌ ${error.message}`);
        subtitleEl.textContent = 'Fix config / environment variables, then try again.';
        joinBtn.hidden = true;
        checkBtn.hidden = false;
      }
    }

    function bootstrap() {
      if (!tg) {
        setStatus('error', 'Telegram WebApp SDK not found.');
        subtitleEl.textContent = 'Open this page via a Telegram bot mini app button.';
        checkBtn.hidden = false;
        checkBtn.textContent = 'Retry';
        checkBtn.onclick = () => window.location.reload();
        return;
      }

      tg.ready();
      tg.expand();

      checkBtn.textContent = "I've joined, check again";
      checkBtn.onclick = checkMembership;

      checkMembership();
    }

    bootstrap();
  </script>
</body>
</html>

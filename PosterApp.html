<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--tg-theme-text-color, #000000);
            background: var(--tg-theme-bg-color, #ffffff);
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 20px;
            z-index: 1;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        p {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 24px;
        }
        .btn {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }
        .btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }
        .user-info {
            margin-top: 20px;
            padding: 16px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            font-size: 14px;
            display: none;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <h1>Hello, Telegram!</h1>
        <p>This is a simple Mini App with TWallpaper background.</p>
        <button class="btn" onclick="showUser()">Show My Info</button>
        <div class="user-info" id="userInfo"></div>
    </div>

    <!-- TWallpaper Background -->
    <script type="module">
        import { TWallpaper } from "https://cdn.jsdelivr.net/npm/twallpaper@latest/dist/twallpaper.js";

        const wallpaper = new TWallpaper(document.body, {
            fps: 60,
            tails: 80,
            tailsSwing: 2,
            trails: 30,
            color: [
                "#0088cc",
                "#0088cc",
                "#179cde",
                "#179cde",
                "#2ca5e0",
                "#2ca5e0",
                "#33a4dd",
                "#33a4dd",
                "#0088cc",
                "#0088cc",
                "#0088cc",
                "#0088cc",
            ],
        });

        wallpaper.init();
    </script>

    <script>
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Apply Telegram theme
        document.body.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#ffffff');
        document.body.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#000000');
        document.body.style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#3390ec');
        document.body.style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
        document.body.style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#f5f5f5');

        function showUser() {
            const user = tg.initDataUnsafe?.user;
            const infoDiv = document.getElementById('userInfo');

            if (user) {
                infoDiv.innerHTML = `
                    <strong>User:</strong> ${user.first_name} ${user.last_name || ''}<br>
                    <strong>Username:</strong> @${user.username || 'N/A'}<br>
                    <strong>ID:</strong> ${user.id}
                `;
            } else {
                infoDiv.innerHTML = 'No user data available. Open this in Telegram.';
            }
            infoDiv.style.display = 'block';
            tg.HapticFeedback.impactOccurred('light');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Access Verification</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0b1020);
      --text: var(--tg-theme-text-color, #eff6ff);
      --hint: var(--tg-theme-hint-color, #93a4bf);
      --btn: var(--tg-theme-button-color, #2563eb);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
      --card: rgba(15, 23, 42, 0.76);
      --border: rgba(148, 163, 184, 0.26);
      --ok: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(1300px 700px at -20% -10%, rgba(59,130,246,.20), transparent 65%),
        radial-gradient(900px 600px at 120% -10%, rgba(16,185,129,.15), transparent 60%),
        var(--bg);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
    }

    .wrap { max-width: 520px; margin: 0 auto; display: grid; gap: 14px; }

    .hero,
    .panel {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
      box-shadow: 0 20px 45px rgba(0,0,0,.35);
    }

    .hero { padding: 18px; }
    .chip {
      display: inline-block;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      color: #bfdbfe;
      background: rgba(59,130,246,.22);
    }

    h1 { margin: 12px 0 6px; font-size: 24px; }
    #subtitle { margin: 0; color: var(--hint); line-height: 1.5; font-size: 14px; }

    #status {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      font-size: 13px;
      color: var(--hint);
    }

    #status.ok { border-left: 3px solid var(--ok); color: #bbf7d0; }
    #status.warn { border-left: 3px solid var(--warn); color: #fde68a; }
    #status.error { border-left: 3px solid var(--err); color: #fecaca; }

    #list { display: grid; gap: 10px; padding: 12px; }

    .item {
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .title { font-size: 15px; font-weight: 700; }
    .meta { display: grid; gap: 4px; }

    .badge {
      display: inline-block;
      width: fit-content;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
    }

    .badge.ok { color: #052e16; background: #86efac; }
    .badge.warn { color: #78350f; background: #fcd34d; }
    .badge.error { color: #7f1d1d; background: #fca5a5; }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      color: var(--btn-text);
      background: linear-gradient(135deg, var(--btn), #1d4ed8);
    }

    .btn.secondary {
      color: var(--text);
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.18);
    }

    .hint {
      color: var(--hint);
      font-size: 12px;
      line-height: 1.45;
      padding: 0 14px 14px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <span class="chip">🔐 Secure verification</span>
      <h1>Verify channel access</h1>
      <p id="subtitle">Checking all required channels before access is granted.</p>
    </section>

    <section class="panel">
      <div id="status" class="warn">Initializing Telegram Mini App…</div>
      <div id="list"></div>
      <p class="hint">Private + public channels are supported. If a private channel is required, use numeric <code>chatId</code> and provide <code>joinUrl</code> in backend config.</p>
    </section>

    <button id="recheck" class="btn">Re-check membership</button>
  </main>

  <script>
    const tg = window.Telegram?.WebApp;
    const statusEl = document.getElementById('status');
    const listEl = document.getElementById('list');
    const subtitleEl = document.getElementById('subtitle');
    const recheckBtn = document.getElementById('recheck');

    function setStatus(kind, text) {
      statusEl.className = kind;
      statusEl.textContent = text;
    }

    function badge(channel) {
      if (channel.joined) return { cls: 'ok', text: 'Joined' };
      if (channel.error) return { cls: 'error', text: 'Error' };
      return { cls: 'warn', text: 'Not joined' };
    }

    function render(channels) {
      listEl.innerHTML = '';

      channels.forEach((channel) => {
        const b = badge(channel);
        const item = document.createElement('article');
        item.className = 'item';

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.innerHTML = `
          <div class="title">${channel.title || channel.channelId}</div>
          <span class="badge ${b.cls}">${b.text}</span>
        `;

        const actions = document.createElement('div');
        if (!channel.joined && channel.joinUrl) {
          const join = document.createElement('button');
          join.className = 'btn secondary';
          join.textContent = 'Join';
          join.onclick = () => tg?.openTelegramLink(channel.joinUrl);
          actions.appendChild(join);
        }

        item.append(meta, actions);
        listEl.appendChild(item);
      });
    }

    async function check() {
      try {
        setStatus('warn', 'Checking memberships…');
        subtitleEl.textContent = 'Please wait while your channel memberships are verified.';
        recheckBtn.disabled = true;

        const initData = tg?.initData;
        if (!initData) {
          throw new Error('Open this app from Telegram. initData is missing.');
        }

        const res = await fetch('/api/check-membership', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ initData })
        });

        const data = await res.json();
        if (!res.ok || !data.ok) {
          throw new Error(data.error || 'Verification failed.');
        }

        render(data.channels || []);

        if (data.allJoined) {
          setStatus('ok', '✅ All channels verified. Closing mini app…');
          subtitleEl.textContent = 'Verification complete. Returning to bot.';
          tg?.HapticFeedback?.notificationOccurred('success');
          tg?.MainButton?.setText('Verified ✅');
          tg?.MainButton?.show();
          tg?.MainButton?.disable();
          setTimeout(() => tg?.close(), 1600);
          return;
        }

        setStatus('warn', 'Join all missing channels, then tap re-check.');
        subtitleEl.textContent = 'After joining, come back here and verify again.';
        tg?.MainButton?.setText('Re-check membership');
        tg?.MainButton?.show();
        tg?.MainButton?.enable();
      } catch (err) {
        setStatus('error', `❌ ${err.message}`);
        subtitleEl.textContent = 'Check backend env config and bot permissions, then retry.';
        tg?.MainButton?.setText('Retry');
        tg?.MainButton?.show();
        tg?.MainButton?.enable();
      } finally {
        recheckBtn.disabled = false;
      }
    }

    function init() {
      if (!tg) {
        setStatus('error', 'Telegram SDK not found. Open via Telegram Mini App.');
        recheckBtn.onclick = () => location.reload();
        return;
      }

      tg.ready();
      tg.expand();
      tg.MainButton?.onClick(check);
      recheckBtn.onclick = check;
      check();
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>TWallpaper CDN</title>

  <!-- Telegram -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #app {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

  <div id="app"></div>

  <!-- TWallpaper -->
  <script src="https://unpkg.com/twallpaper@latest/dist/index.umd.js"></script>

  <script>
    // Telegram
    const tg = window.Telegram.WebApp;

    tg.ready();
    tg.expand();

    // IMPORTANT:
    // unpack from global
    const { TWallpaper } = window;

    const container =
      document.getElementById('app');

    const wallpaper =
      new TWallpaper(container, {

        colors: [
          '#4f5bd5',
          '#962fbf',
          '#dd6cb9',
          '#fec496'
        ],

        animate: true,

        scrollAnimate: true,

        fps: 60,

        tails: 40,

        pattern: {
          mask: true,

          size: '420px',

          image:
            'https://twallpaper.js.org/patterns/games.svg'
        }
      });

    wallpaper.init();
  </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ReqLab - API Tester</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: #0f172a;
  color: #e5e7eb;
}

.container {
  padding: 15px;
}

h2 {
  margin-bottom: 10px;
}

.input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: 1px solid #334155;
  background: #020617;
  color: #e5e7eb;
  font-family: monospace;
}

textarea {
  height: 120px;
}

button {
  padding: 10px;
  border: 0;
  border-radius: 6px;
  cursor: pointer;
  margin-right: 5px;
}

.send {
  background: #22c55e;
  color: #000;
}

.template {
  background: #334155;
  color: #fff;
  margin-top: 5px;
}

.response {
  margin-top: 15px;
  background: #020617;
  border: 1px solid #334155;
  padding: 10px;
  border-radius: 6px;
  max-height: 300px;
  overflow: auto;
  white-space: pre-wrap;
}

.copy {
  background: #16a34a;
  color: #fff;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🧪 ReqLab</h2>

<label>Method</label>
<select id="method">
  <option value="GET">GET</option>
  <option value="POST">POST</option>
</select>

<label>API URL</label>
<input class="input" id="url" placeholder="https://api.example.com">

<label>JSON Body (POST)</label>
<textarea id="body">{}</textarea>

<button class="send" onclick="sendRequest()">🚀 Send Request</button>

<h3>⚡ Telegram Templates</h3>

<button class="template" onclick="tplGetMe()">getMe</button>
<button class="template" onclick="tplSendMsg()">sendMessage</button>

<div class="response" id="responseBox">
Response will appear here...
</div>

<button class="copy" onclick="copyResponse()">📋 Copy Response</button>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

let lastResponse = "";

// ---------- SEND REQUEST ----------
function sendRequest() {

  let method = document.getElementById("method").value;
  let url = document.getElementById("url").value;
  let bodyText = document.getElementById("body").value;

  let box = document.getElementById("responseBox");
  box.innerText = "⏳ Loading...";

  let options = {
    method: method,
    headers: { "Content-Type": "application/json" }
  };

  if (method === "POST") {
    try {
      options.body = bodyText;
    } catch (e) {
      box.innerText = "❌ Invalid JSON";
      return;
    }
  }

  fetch(url, options)
    .then(res => res.text())
    .then(text => {
      try {
        let json = JSON.parse(text);
        lastResponse = JSON.stringify(json, null, 2);
      } catch {
        lastResponse = text;
      }

      box.innerText = lastResponse;
    })
    .catch(err => {
      box.innerText = "❌ Error: " + err;
    });
}

// ---------- COPY ----------
function copyResponse() {
  navigator.clipboard.writeText(lastResponse);
  alert("Copied!");
}

// ---------- TEMPLATES ----------
function tplGetMe() {
  let token = prompt("Enter Bot Token:");
  if (!token) return;

  document.getElementById("method").value = "GET";
  document.getElementById("url").value =
    "https://api.telegram.org/bot" + token + "/getMe";
}

function tplSendMsg() {
  let token = prompt("Enter Bot Token:");
  if (!token) return;

  document.getElementById("method").value = "POST";
  document.getElementById("url").value =
    "https://api.telegram.org/bot" + token + "/sendMessage";

  document.getElementById("body").value =
`{
  "chat_id": "",
  "text": "Hello from ReqLab"
}`;
}

</script>

</body>
</html>

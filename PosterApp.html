<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>TWallpaper CDN Test</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- TWallpaper CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/twallpaper@latest/dist/cdn/style.css"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(
          to bottom,
          rgba(0,0,0,0.2),
          rgba(0,0,0,0.45)
        );
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;

      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;

      color: white;
      font-size: 28px;
      font-weight: 700;

      text-shadow:
        0 4px 20px rgba(0,0,0,0.45);
    }
  </style>
</head>

<body>

  <!-- Wallpaper -->
  <div id="app"></div>

  <!-- Dark overlay -->
  <div class="overlay"></div>

  <!-- Demo content -->
  <div class="content">
    Telegram TWallpaper
  </div>

  <!-- TWallpaper CDN -->
  <script src="https://cdn.jsdelivr.net/npm/twallpaper@latest/dist/index.umd.js"></script>

  <script>
    // Telegram Mini App
    const tg = window.Telegram.WebApp;

    tg.ready();
    tg.expand();

    // Container
    const container =
      document.getElementById('app');

    // Wallpaper
    const wallpaper =
      new window.TWallpaper(container, {

        colors: [
          '#4f5bd5',
          '#962fbf',
          '#dd6cb9',
          '#fec496'
        ],

        animate: true,

        scrollAnimate: true,

        fps: 60,

        tails: 80,

        pattern: {

          image:
            'https://twallpaper.js.org/patterns/games.svg',

          mask: true,

          size: '500px'
        }
      });

    wallpaper.init();
  </script>

</body>
</html>
